<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account - equiome</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f7f8;
            --panel: #ffffff;
            --border: #d7dee7;
            --text: #243342;
            --muted: #5b6573;
            --primary: #2a7f9e;
            --primary-dark: #216982;
            --shadow: 0 16px 40px rgba(18, 52, 77, 0.12);
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 32px;
            box-shadow: var(--shadow);
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            text-transform: lowercase;
            color: #12344d;
            margin-bottom: 24px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .muted {
            color: var(--muted);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 12px 12px;
            font-size: 14px;
            border-radius: 8px;
        }

        input,
        select {
            border: 1px solid var(--border);
            background: white;
        }

        button {
            border: none;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer-link {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">equiome</div>
        <h1>Create account</h1>
        <p class="muted">Add a new workspace user.</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    minlength="6"
                    required
                >
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="agent">Agent</option>
                    <option value="assessor">Assessor</option>
                </select>
            </div>

            <button type="submit">Create account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</body>
</html>
