<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - equiome</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f7f8;
            --panel: #ffffff;
            --border: #d7dee7;
            --text: #243342;
            --muted: #5b6573;
            --primary: #2a7f9e;
            --primary-dark: #216982;
            --sidebar: #12344d;
            --shadow: 0 16px 40px rgba(18, 52, 77, 0.12);
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background:
                linear-gradient(135deg, rgba(42, 127, 158, 0.12), rgba(255, 255, 255, 0) 42%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .shell {
            width: 100%;
            max-width: 960px;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 28px;
            align-items: stretch;
        }

        .intro {
            background: var(--sidebar);
            color: white;
            border-radius: 8px;
            padding: 34px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 420px;
            box-shadow: var(--shadow);
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            text-transform: lowercase;
        }

        .intro h1 {
            font-size: 36px;
            line-height: 1.08;
            margin: 42px 0 12px;
        }

        .intro p {
            color: #dbe7ee;
            margin: 0;
            line-height: 1.55;
        }

        .intro-footer {
            color: #bcd0dc;
            font-size: 13px;
        }

        .card {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 32px;
            box-shadow: var(--shadow);
        }

        .card h1 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .muted {
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.45;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        input,
        button {
            width: 100%;
            padding: 12px 12px;
            font-size: 14px;
            border-radius: 8px;
        }

        input {
            border: 1px solid var(--border);
            background: white;
            color: var(--text);
        }

        button {
            border: none;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer-link {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        @media (max-width: 820px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .intro {
                min-height: auto;
                padding: 24px;
            }

            .intro h1 {
                font-size: 28px;
                margin-top: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="intro">
            <div>
                <div class="brand">equiome</div>
                <h1>Property leads, referrals, and follow-up in one place.</h1>
                <p>Sign in to manage valuation leads, EPC opportunities, referrals, tasks, and agent activity.</p>
            </div>
            <div class="intro-footer">Secure agent workspace</div>
        </section>

        <div class="card">
            <h1>Sign in</h1>
            <p class="muted">Access your equiome workspace.</p>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit">Sign in</button>
            </form>

            <div class="footer-link">
                No account? <a href="/register">Create one</a>
            </div>
        </div>
    </div>
</body>
</html>
